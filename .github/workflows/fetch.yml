name: Fetch Papers Daily

on:
  schedule:
    - cron: "0 6 * * *"   # 每天 06:00 UTC = 北京时间 14:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run paper fetcher
        env:
          KEYWORDS: >-
            lattice boltzmann method,lattice boltzmann,LBM,
            WRF,weather research and forecasting,
            diurnal cycle,diurnal variation,
            wind turbine,wind turbines,
            wake,wind farm,wind energy,
            turbulence,atmospheric boundary layer,ABL,
            vortex,drag reduction,heat transfer,
            fluid structure interaction,
            renewable energy,ocean energy,tidal,wave energy
          DAYS_BACK: "30"
          OUTPUT_DIR: "_data"
        run: python fetch_papers.py

      - name: Write metadata
        run: |
          echo "last_updated: \"$(date -u +'%Y-%m-%d %H:%M UTC')\"" > _data/papers_meta.yml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/papers.json _data/papers_meta.yml
          git diff --cached --quiet || git commit -m "📚 Update papers $(date -u +'%Y-%m-%d')"
          git push
